# ─────────────────────────────────────────────────────────────────────────────
# Vlens-Trust: ViT-B/16 Image Encoder Configuration
# Paper Section 5.2 — Image Modality Baseline & Shared Visual Backbone
# ─────────────────────────────────────────────────────────────────────────────

model:
  name: ViT-B/16
  backbone: vit_base_patch16_224       # timm model key
  pretrained: true
  pretrained_source: imagenet21k        # ImageNet-21k → fine-tuned on ImageNet-1k
  image_size: 224
  patch_size: 16
  num_heads: 12
  num_layers: 12
  hidden_dim: 768
  mlp_ratio: 4.0
  dropout: 0.1
  attention_dropout: 0.0
  num_classes: 2                        # authentic / suspicious

training:
  seed: 42
  epochs: 50
  early_stopping_patience: 8
  batch_size: 32
  gradient_accumulation_steps: 2        # effective batch = 64

optimizer:
  type: AdamW
  lr: 2.0e-5                            # low LR for fine-tuning
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  type: CosineAnnealingLR
  T_max: 50
  eta_min: 1.0e-7
  warmup_epochs: 3
  warmup_lr: 1.0e-6

loss:
  type: CrossEntropyLoss
  label_smoothing: 0.1
  class_weights: [1.0, 1.5]            # up-weight suspicious class (40% minority)

data:
  train_csv: data/product_authenticity/train.csv
  val_csv:   data/product_authenticity/val.csv
  test_csv:  data/product_authenticity/test.csv
  image_col: img_reverse_match_rate     # proxy column; replace with actual image paths in production
  label_col: authenticity_label

augmentation:
  train:
    - RandomResizedCrop: {size: 224, scale: [0.7, 1.0]}
    - RandomHorizontalFlip: {p: 0.5}
    - ColorJitter: {brightness: 0.3, contrast: 0.3, saturation: 0.2, hue: 0.05}
    - RandomGrayscale: {p: 0.05}
    - Normalize: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
  val_test:
    - Resize: {size: 256}
    - CenterCrop: {size: 224}
    - Normalize: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}

evaluation:
  metrics: [accuracy, precision, recall, f1, auroc, average_precision]
  primary_metric: f1
  threshold: 0.5

output:
  checkpoint_dir: checkpoints/vit_b16/
  log_dir: logs/vit_b16/
  save_best: true
  save_last: true

hardware:
  num_workers: 4
  pin_memory: true
  fp16: true                            # AMP mixed precision
